
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>食材一覧</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" th:href="@{/style.css}">
<!-- Font Awesome 読み込み -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">


</head>
<body>
	
	<header class="page-header">

	    <h1 class="page-title">🥦 食材一覧 🥕</h1>

	    <!-- ログインユーザ表示 -->
	    <p class="welcome-message">
	        <i class="fa-solid fa-user"></i>
	        <span sec:authentication="name"></span> さん、ようこそ！
	    </p>

	</header>
	
	<div class="deadline-alert">

	    <span class="expired">
	        <i class="fa-solid fa-circle-exclamation"></i>
	        今日の期限切れ: <span th:text="${expiredCount}"></span>件
	    </span>

	    <span class="warning">
	        期限間近: <span th:text="${warningCount}"></span>件
	    </span>

	</div>
	
	<div>

	    <!-- すべて -->
	    <a th:href="@{/users}" 
	       th:classappend="${selectedCategory == null} ? 'active'"
	       class="tab">
	       すべて
	    </a>

	    <!-- DBカテゴリ -->
	    <a th:each="cat : ${categories}"
	       th:href="@{/users/filter(category=${cat.id})}"
	       th:text="${cat.name}"
	       th:classappend="${selectedCategory == cat.id} ? 'active'"
	       class="tab">
	    </a>

	</div>

	    
	</div>

	<div class="search-bar">

	<form th:action="@{/users/filter}" method="get" class="search-form">

	    <!-- 🔍 名前検索 -->
	    <input type="text"
	           name="keyword"
	           placeholder="食材を検索"
	           class="search-input">

	    <!-- カテゴリ -->
	    <select name="category" class="category-select">
	        <option value="">すべて</option>
	        <option th:each="cat : ${categories}"
	                th:value="${cat.id}"
	                th:text="${cat.name}">
	        </option>
	    </select>

	    <!-- 期限間近 -->
	    <label class="expiring-check">
	        <input type="checkbox" name="expiringSoon" value="true">
	        期限間近
	    </label>

	    <!-- 検索ボタン -->
	    <button type="submit" class="search-btn">
	        <i class="fa-solid fa-magnifying-glass"></i>
	    </button>

	</form>

	<!-- 右側ボタン -->
	<div class="action-buttons">

	    <a th:href="@{/users/shoppingList}" class="basket-btn">
	        <i class="fa-solid fa-basket-shopping"></i>
	        買い物リスト (<span th:text="${shoppingCount}"></span>)
	    </a>

	    <a th:href="@{/users/add}" class="add-btn">
	        <i class="fa-solid fa-plus"></i>
	        食材追加
	    </a>

	</div>

	</div>


<div id="popupMessage" th:if="${successMessage}" th:text="${successMessage}" class="popup-message"></div>

<div class="bulk-actions">

    <button type="button" id="bulkDeleteBtn" class="bulk-btn delete">
        <i class="fa-solid fa-trash"></i>
        まとめて削除
    </button>

    <button type="button" id="bulkShoppingBtn" class="bulk-btn shopping">
        <i class="fa-solid fa-basket-shopping"></i>
        買い物リストへ追加
    </button>

</div>

<!-- 食材一覧を囲む -->
<div class="table-wrapper">
    <div class="table-container">
        <table>
			<tr>
			    <th>
			        <input type="checkbox" id="selectAll">
			    </th>
				<th>食材</th>
			    <th class="hidden">カテゴリー</th>
			    <th>量</th>
			    <th>期限</th>
			    <th>メモ</th>
			    <th>お気に入り</th>
				<th>編集</th>
			    <th></th>
			    <th></th>
			</tr>

            <tr th:each="item : ${items}" >
				<td>
				    <input type="checkbox"
				           class="item-checkbox"
				           th:value="${item.id}">
				</td>
                
				<td class="food-cell">
				  <span
				    class="food-label"
				    th:text="${item.name}"
				    th:classappend="' category-' + ${item.categoryId}">
				  </span>
				</td>
                <td class="hidden" th:text="${item.categoryName}"></td>
                <td th:text="${item.amount}"></td>
                <td th:text="${item.deadline}"></td>
                <td th:text="${item.others}"></td>
                <td>
                    <form th:action="@{/users/favorite/{id}(id=${item.id})}" method="post">
						<!-- ✅ 現在のフィルター条件を保持する hidden -->
						<input type="hidden" name="category" th:value="${selectedCategory}">
						<input type="hidden" name="expiringSoon" th:value="${expiringSoon}">
						<button type="submit" class="heart-btn">
						    <i class="fa-solid fa-heart"
						       th:classappend="${item.favorite} ? 'active' : ''"></i>
						</button>
                    </form>
                </td>
				<td>				
					<a th:href="@{/users/edit/{id}(id=${item.id})}" class="edit-btn">
						<i class="fa-solid fa-pen"></i>
					</a>
				</td>
                <td>
                    <!-- ✅ お気に入り時に確認＆買い物リスト追加 -->
                    <form th:action="@{/users/stop/{id}(id=${item.id})}" method="post"
                          th:onsubmit="'return handleStop(event,' + ${item.favorite} + ',' + ${item.id} + ');'">
                        <input type="submit" value="使い切った！" class="button">
                    </form>
                </td>
				<td
				    th:class="
				        ${item.message == '期限切れです'} ? 'danger' :
				        (${item.message == '気を付けて'} ? 'warning' : '')
				    "
				>

				    <!-- 🔥 期限切れ（赤） -->
				    <span th:if="${item.message == '期限切れです'}">
				        <i class="fa-solid fa-circle-exclamation" style="margin-right:6px; color: #c27a7a;"></i>
						<span th:text="${item.message}" style="color: #c27a7a;"></span>
				    </span>

					<!-- ⚠ 期限間近（オレンジ/黄色） -->
					<span th:if="${item.message == '気を付けて'}">
					    <i class="fa-solid fa-triangle-exclamation" style="margin-right:6px; color: #cfa87c;"></i>
					    <span th:text="${item.message}"></span>
					</span>

				    <!-- メッセージなし -->
				    <span th:if="${item.message == ''}"></span>
				</td>







            </tr>
        </table>
    </div>
</div>

<script th:inline="javascript">
/* ✅ ポップアップの自動フェードアウト */
window.addEventListener('DOMContentLoaded', function() {
    const popup = document.getElementById('popupMessage');
    if (popup) {
        setTimeout(() => {
            popup.style.transition = "opacity 0.5s ease-out";
            popup.style.opacity = '0';
            setTimeout(() => popup.remove(), 500);
        }, 2500);
    }
});

/* ✅ お気に入りなら「買い物リスト追加」確認 */
function handleStop(event, isFavorite, itemId) {
    event.preventDefault();
	
	// 🟡 まず確認ダイアログを表示
	const confirmed = confirm("使い切りましたか？");
	if (!confirmed) {
	    return; // キャンセルした場合、処理を中断
	}

    if (isFavorite) {
        const addToList = confirm("この食材はお気に入りです。買い物リストに追加しますか？");
        if (addToList) {
            fetch(`/users/add-to-shopping-list/${itemId}`, {
                method: "POST"
            })
            .then(response => {
                if (response.ok) {
                    alert("買い物リストに追加しました！");
                } else {
                    alert("追加に失敗しました。");
                }
            })
            .catch(() => alert("通信エラーが発生しました。"));
        }
    }

    // ✅ 「使い切った」フォームを送信
    event.target.submit();
}

// 選択されたIDを取得
function getSelectedItems() {

    const checkboxes = document.querySelectorAll(".item-checkbox:checked");

    const ids = [];

    checkboxes.forEach(cb => {
        ids.push(cb.value);
    });

    return ids;
}

document.getElementById("bulkDeleteBtn").addEventListener("click", function() {

    const ids = getSelectedItems();

    if (ids.length === 0) {
        alert("食材を選択してください");
        return;
    }

    if (!confirm("選択した食材を削除しますか？")) {
        return;
    }

    fetch("/users/bulk-delete", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(ids)
    })
    .then(response => {
        if (response.ok) {
            location.reload();
        } else {
            alert("削除に失敗しました");
        }
    });

});

// 全選択チェックボックス
document.getElementById("selectAll").addEventListener("change", function() {

    const checked = this.checked;

    const checkboxes = document.querySelectorAll(".item-checkbox");

    checkboxes.forEach(cb => {
        cb.checked = checked;
    });

});

document.getElementById("bulkShoppingBtn").addEventListener("click", function() {

    const ids = getSelectedItems();

    if (ids.length === 0) {
        alert("食材を選択してください");
        return;
    }

    if (!confirm("選択した食材を買い物リストに追加しますか？")) {
        return;
    }

    fetch("/users/bulk-add-shopping-list", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(ids)
    })
    .then(response => {
        if (response.ok) {
            alert("買い物リストに追加しました！");
            location.reload();
        } else {
            alert("追加に失敗しました");
        }
    });

});

</script>


</body>
</html>
