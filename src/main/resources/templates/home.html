
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>食材一覧</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDP+Gothic:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">
<!-- Font Awesome 読み込み -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">


</head>
<body>
	
	<header class="page-header">

	    <h1 class="page-title">🥦 食材一覧 🥕</h1>

		<p class="welcome-message">
			        <i class="fa-solid fa-user"></i>
			        <span sec:authentication="name"></span> さん、ようこそ！
			    </p>
		
	
	<div class="deadline-alert">

	    <span class="expired">
	        <i class="fa-solid fa-circle-exclamation"></i>
	        期限切れ:
			<a th:href="@{/users/filter(expired=true)}">
             <span th:text="${expiredCount}"></span>
            </a>件
	    </span>

	    <span class="warning">
	        期限間近:
			<a th:href="@{/users/filter(expiringSoon=true)}">
             <span th:text="${warningCount}"></span>
           </a>件
	    </span>

	</div>
	
	<div class="search-bar">

	<form th:action="@{/users/filter}" method="get" class="search-form">

	    <!-- 🔍 名前検索 -->
	    <input type="text"
	           name="keyword"
	           placeholder="食材を検索"
	           class="search-input">

	    <!-- カテゴリ -->
	    <select name="category" class="category-select">
	        <option value="">すべて</option>
	        <option th:each="cat : ${categories}"
	                th:value="${cat.id}"
	                th:text="${cat.name}">
	        </option>
	    </select>

	    <!-- 期限間近 -->
	    <label class="expiring-check">
	        <input type="checkbox" name="expiringSoon" value="true">
	        期限間近
	    </label>

	    <!-- 検索ボタン -->
	    <button type="submit" class="search-btn">
	        <i class="fa-solid fa-magnifying-glass"></i>
	    </button>

	</form>

	<!-- 右側ボタン -->
	<div class="action-buttons">
		
		<a th:href="@{/users/shoppingList}" class="basket-btn">
				        <i class="fa-solid fa-basket-shopping"></i>
				        買い物リスト (<span th:text="${shoppingCount}"></span>)
		</a>

	    <a th:href="@{/users/add}" class="add-btn">
	        <i class="fa-solid fa-plus"></i>
	        食材追加
	    </a>

	</div>

	</div>


		<div class="category-tabs">
	    <!-- すべて -->
		<a th:href="@{/users}" th:classappend="${selectedCategory == null} ? 'active'" class="alltab select">
			すべて
			<span class="badge" th:if="${#lists.size(hvm.items) > 0}" th:text="${#lists.size(hvm.items)}"></span>
		</a>

	    <!-- DBカテゴリ -->
		<a th:each="cat : ${categories}"
		   th:href="@{/users/filter(category=${cat.id})}"
		   th:classappend="${selectedCategory == cat.id} ? 'active'" class="tab select">
			<span th:text="${cat.name}"></span>
			<span class="badge" th:if="${categoryCounts[cat.id] != null and categoryCounts[cat.id] > 0}"
			      th:text="${categoryCounts[cat.id]}"></span>
		</a>

		</div>


	</header>
	
	<div class="bulk-actions">

	    <button type="button" id="bulkDeleteBtn" class="bulk-btn delete">
	        <i class="fa-solid fa-trash"></i>
	        消費済みにする
	    </button>

	    <button type="button" id="bulkShoppingBtn" class="bulk-btn shopping">
	        <i class="fa-solid fa-basket-shopping"></i>
	        買い物リストへ追加する
	    </button>

	</div>


<!-- 食材一覧を囲む -->
<div class="table-wrapper">
    <div class="table-container">
        <table>
			<tr>
			    <th>
			        <input type="checkbox" id="selectAll">
			    </th>
				<th>食材</th>
			    <th class="hidden">カテゴリー</th>
			    <th>量</th>
			    <th>期限</th>
			    <th>メモ</th>
			    <th>操作</th>
			</tr>

            <tr th:each="item : ${hvm.filteredItems}" >
				<td>
				<input type="checkbox"
				       class="item-checkbox"
				       th:value="${item.id}"
				       th:data-favorite="${item.favorite}"
					   th:data-name="${item.name}">
				</td>	   
                
				<td class="food-cell">
				  <span
				    class="food-label"
				    th:text="${item.name}"
				    th:classappend="' category-' + ${item.categoryId}">
				  </span>
				</td>
                <td class="hidden" th:text="${item.categoryName}"></td>
                <td th:text="${item.amount}"></td>
				<td class="deadline-cell">

					<!-- アイコン枠（常に存在させる） -->
					<span class="deadline-icon">
        <i th:if="${item.message == '期限切れです'}"
           class="fa-solid fa-circle-exclamation icon-danger"></i>

        <i th:if="${item.message == '期限間近'}"
           class="fa-solid fa-triangle-exclamation icon-warning"></i>
    </span>

					<!-- 日付 -->
					<span th:text="${item.deadline}"></span>

				</td>
                <td th:text="${item.others}"></td>
				<td class="action-cell">

					<form th:action="@{/users/favorite/{id}(id=${item.id})}" method="post" class="action-item">
						<input type="hidden" name="category" th:value="${selectedCategory}">
						<input type="hidden" name="expiringSoon" th:value="${expiringSoon}">
						<button type="submit" class="heart-btn">
							<i class="fa-solid fa-heart" th:classappend="${item.favorite} ? 'active' : ''"></i>
						</button>
					</form>

					<a th:href="@{/users/edit/{id}(id=${item.id})}" class="edit-btn action-item">
						<i class="fa-solid fa-pencil"></i>
					</a>

				</td>

            </tr>
        </table>
    </div>
</div>


<script src="/js/common.js"></script>

<script th:inline="javascript">

// 選択されたIDを取得
function getSelectedItems() {

    const checkboxes = document.querySelectorAll(".item-checkbox:checked");

    const ids = [];

    checkboxes.forEach(cb => {
        ids.push(cb.value);
    });

    return ids;
}

//消費済みにする　ボタン押下時の処理
document.getElementById("bulkDeleteBtn").addEventListener("click", function () {

    const checkboxes = document.querySelectorAll(".item-checkbox:checked");

    if (checkboxes.length === 0) {
		showPopupAndReload("食材を選択してください", "error");
        return;
    }

    const ids = [];
    const favoriteItems = [];
    const favoriteIds = [];

    checkboxes.forEach(cb => {

		// value = item.id  削除対象アイテムのidを格納
        ids.push(cb.value);  

        if (cb.dataset.favorite === "true") {
            favoriteItems.push(cb.dataset.name);
            favoriteIds.push(cb.value);
        }

    });

    // ① 消費確認
    if (!confirm("選択した食材を消費済みにしますか？")) {
        return;
    }

    const addIds = [];

    // ② お気に入りごとに確認
    for (let i = 0; i < favoriteItems.length; i++) {

        const itemName = favoriteItems[i];
        const itemId = favoriteIds[i];

        const message =
            itemName + " はお気に入りの食材です。\n買い物リストに追加しますか？";

        if (confirm(message)) {
            addIds.push(itemId);  //買い物リストへ追加するアイテムのidを格納していく
        }

    }

    
    if (addIds.length > 0) {
		
		// 買い物リストに追加
        fetch("/users/bulk-add-shopping-list", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(addIds)
        })
				.then(async response => {

					if (response.ok) {

						deleteItems(ids);

					} else {

						const message = await response.text();

						if (message.includes("すでに")) {
							showPopupAndReload(message, "error");    //重複あった場合のメッセージ
							deleteItems(ids);　//アイテムは削除
						} else {
							showPopupAndReload("買い物リスト追加に失敗しました", "error");
						}

					}

				})
				.catch(error => {
					console.error(error);
					showPopupAndReload("通信エラーが発生しました", "error");
				});
	} else {

		deleteItems(ids);
	}
});

function deleteItems(ids) {

    fetch("/users/bulk-delete", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(ids)
    })
    .then(response => {

		if (response.ok) {
			showPopupAndReload("消費済みにしました");
		} else {
			showPopupAndReload("削除に失敗しました", "error");
		}

    });

}

// 全選択チェックボックス
document.getElementById("selectAll").addEventListener("change", function() {

    const checked = this.checked;

    const checkboxes = document.querySelectorAll(".item-checkbox");

    checkboxes.forEach(cb => {
        cb.checked = checked;
    });

});


//買い物リストへ追加する　ボタン押下時の処理

document.getElementById("bulkShoppingBtn").addEventListener("click", function() {

	const ids = getSelectedItems();

	if (ids.length === 0) {
		showPopupAndReload("食材を選択してください", "error");
		return;
	}

	if (!confirm("選択した食材を買い物リストに追加しますか？")) {
		return;
	}

	fetch("/users/bulk-add-shopping-list", {
		method: "POST",
		headers: {
			"Content-Type": "application/json"
		},
		body: JSON.stringify(ids)
	})
			.then(async response => {

				if (response.ok) {

					showPopupAndReload("買い物リストに追加しました！");

				} else {
                       //二重登録になる場合
					const message = await response.text();
					showPopupAndReload(message, "error");  //　～はすでに買い物リストに存在しています

				}

			})
			.catch(error => {
				console.error(error);
				showPopupAndReload("通信エラーが発生しました", "error");
			});

});


</script>


</body>
</html>
